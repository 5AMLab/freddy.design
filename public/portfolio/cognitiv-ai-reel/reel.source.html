<style>
  html,body{margin:0;padding:0;background:#0D0D0D;}
  .stage{
    width:1080px;height:1080px;background:#0D0D0D;
    position:relative;overflow:hidden;
  }
  /* warm gold radial glow behind the mark, fades in as it settles */
  .glow{
    position:absolute;inset:0;
    background:radial-gradient(circle at 50% 44%, rgba(201,169,110,0.16) 0%, rgba(201,169,110,0) 40%);
    opacity:0;
  }
  .wrap{
    position:absolute;inset:0;
    display:flex;align-items:center;justify-content:center;
  }
  /* the logo box that holds both groups, sized in px */
  .logo{position:relative;width:560px;height:640px;}
  svg{position:absolute;top:0;left:0;width:100%;height:100%;overflow:visible;}
  .mark .st0, .word .st0{fill:#F4F1EC;}
  .markGlow{filter:drop-shadow(0 0 22px rgba(201,169,110,0.0));}
</style>

<script>
// ---- timeline driven by a single normalized time u in [0,1] ----
// total duration handled by frame count externally.
const TOTAL = 1.0;

// easing
const easeOutCubic = t => 1 - Math.pow(1 - t, 3);
const easeInOutCubic = t => t < .5 ? 4*t*t*t : 1 - Math.pow(-2*t+2,3)/2;
const easeOutBack = (t,s=1.2) => 1 + (s+1)*Math.pow(t-1,3) + s*Math.pow(t-1,2);
const clamp01 = t => Math.max(0, Math.min(1, t));
const seg = (u,a,b) => clamp01((u-a)/(b-a));

const mark = document.getElementById('mark');
const word = document.getElementById('word');
const glow = document.getElementById('glow');
const markSvg = document.getElementById('markSvg');

// mark geometry center within 0..70 / 0..80 viewBox: mark lives ~ (4..70, 0..65)
const CX = 34.9, CY = 32.4;

function render(u){
  // ---- MARK spin-up: many turns, decelerating into final rest ----
  // phase 0.00 -> 0.78 : spin and settle
  const spinPhase = seg(u, 0.0, 0.80);
  const sp = easeOutCubic(spinPhase);            // fast then slow
  const TURNS = 2.75;                            // total rotations
  const angle = (1 - sp) * TURNS * 360;          // starts fast, ends at 0
  // tiny overshoot settle at the very end of spin
  const settle = seg(u, 0.74, 0.86);
  const overshoot = (easeOutBack(settle) - 1) * 4; // small degrees wobble -> 0
  const rot = angle + overshoot;

  // scale: pop in from 0.6 -> 1.0 early, with a hair of overshoot
  const sIn = seg(u, 0.0, 0.30);
  const scale = 0.62 + (1.0 - 0.62) * easeOutBack(sIn, 1.4);

  // mark opacity in
  const mOp = seg(u, 0.0, 0.18);
  mark.style.opacity = easeOutCubic(mOp);
  // rotate + scale around the mark's true bbox center, using ONLY the SVG
  // transform attribute (mixing CSS transform-origin breaks in headless chromium)
  mark.setAttribute('transform',
    `rotate(${rot} ${CX} ${CY}) translate(${CX} ${CY}) scale(${scale}) translate(${-CX} ${-CY})`);

  // ---- glow grows as it settles ----
  const gPhase = seg(u, 0.45, 0.92);
  glow.style.opacity = easeInOutCubic(gPhase);
  // gold drop-shadow on the mark ramps in near the end
  const ds = easeOutCubic(seg(u,0.55,0.95));
  markSvg.style.filter = `drop-shadow(0 0 22px rgba(201,169,110,${(0.28*ds).toFixed(3)}))`;

  // ---- WORDMARK reveal: fade + slide up, after mark settles ----
  const wPhase = seg(u, 0.70, 0.98);
  const we = easeOutCubic(wPhase);
  word.style.opacity = we;
  const dy = (1 - we) * 10; // slide up 10 user-units
  word.setAttribute('transform', `translate(0 ${dy})`);

  // ---- gentle hold/breath at the very end ----
}

// expose for headless frame capture: window.__seek(frameIndex, totalFrames)
window.__seek = function(i, n){
  const u = n <= 1 ? 1 : i/(n-1);
  render(u);
  return u;
};

// Render based on URL hash: #i=<frame>&n=<total>  (for headless frame capture)
function renderFromHash(){
  const h = new URLSearchParams(location.hash.slice(1));
  if(h.has('i') && h.has('n')){
    window.__seek(parseInt(h.get('i'),10), parseInt(h.get('n'),10));
  } else if(h.has('u')){
    render(parseFloat(h.get('u')));
  } else {
    render(1.0);
  }
}
renderFromHash();
window.addEventListener('hashchange', renderFromHash);
</script>
